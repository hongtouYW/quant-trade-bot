<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantBot - 交易日历</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', monospace;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
        }
        .header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 20px; color: #58a6ff; }
        .header a { color: #58a6ff; text-decoration: none; font-size: 14px; }
        .header a:hover { text-decoration: underline; }

        .nav-bar {
            display: flex; align-items: center; gap: 16px;
            padding: 16px 24px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
        }
        .nav-btn {
            padding: 6px 16px; border: 1px solid #30363d; border-radius: 6px;
            background: #21262d; color: #c9d1d9; cursor: pointer; font-size: 14px;
        }
        .nav-btn:hover { background: #30363d; }
        .month-label { font-size: 20px; font-weight: 700; min-width: 160px; text-align: center; }

        .summary-bar {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px;
            padding: 16px 24px;
        }
        .summary-card {
            background: #161b22; border: 1px solid #30363d;
            border-radius: 8px; padding: 14px 16px;
        }
        .summary-card .label { font-size: 11px; text-transform: uppercase; color: #8b949e; letter-spacing: 0.5px; }
        .summary-card .val { font-size: 24px; font-weight: 700; margin-top: 4px; }
        .positive { color: #3fb950; }
        .negative { color: #f85149; }

        .calendar-grid {
            padding: 0 24px 24px;
        }
        .weekdays {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
            margin-bottom: 2px;
        }
        .weekday {
            text-align: center; font-size: 12px; color: #8b949e;
            padding: 8px; font-weight: 600;
        }
        .days {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
        }
        .day-cell {
            background: #161b22; border: 1px solid #21262d;
            border-radius: 6px; min-height: 90px; padding: 8px;
            cursor: pointer; transition: border-color 0.2s;
            position: relative;
        }
        .day-cell:hover { border-color: #58a6ff; }
        .day-cell.empty { background: #0d1117; border-color: transparent; cursor: default; }
        .day-cell.today { border-color: #58a6ff; }
        .day-cell.profit { border-left: 3px solid #3fb950; }
        .day-cell.loss { border-left: 3px solid #f85149; }
        .day-cell.no-trade { opacity: 0.5; }
        .day-num {
            font-size: 13px; font-weight: 600; color: #8b949e;
            margin-bottom: 4px;
        }
        .day-cell.today .day-num { color: #58a6ff; }
        .day-pnl { font-size: 16px; font-weight: 700; }
        .day-count { font-size: 11px; color: #8b949e; margin-top: 2px; }
        .day-wl { font-size: 11px; }
        .day-wl .w { color: #3fb950; }
        .day-wl .l { color: #f85149; }

        .detail-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 100;
        }
        .detail-overlay.show { display: flex; align-items: center; justify-content: center; }
        .detail-panel {
            background: #161b22; border: 1px solid #30363d;
            border-radius: 12px; width: 90%; max-width: 800px;
            max-height: 80vh; overflow-y: auto;
        }
        .detail-header {
            padding: 16px 20px; border-bottom: 1px solid #30363d;
            display: flex; justify-content: space-between; align-items: center;
        }
        .detail-header h2 { font-size: 18px; }
        .detail-close {
            background: none; border: none; color: #8b949e;
            font-size: 24px; cursor: pointer;
        }
        .detail-close:hover { color: #c9d1d9; }
        .detail-summary {
            padding: 16px 20px; border-bottom: 1px solid #21262d;
            display: flex; gap: 24px;
        }
        .detail-summary .item { }
        .detail-summary .item .label { font-size: 11px; color: #8b949e; text-transform: uppercase; }
        .detail-summary .item .val { font-size: 18px; font-weight: 700; }
        .detail-body { padding: 16px 20px; }
        .detail-body table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .detail-body th { text-align: left; color: #8b949e; padding: 8px; font-weight: 500; border-bottom: 1px solid #21262d; }
        .detail-body td { padding: 8px; border-bottom: 1px solid #21262d; }
        .detail-body tr:hover td { background: #1c2128; }
        .dir-long { color: #3fb950; }
        .dir-short { color: #f85149; }

        @media (max-width: 768px) {
            .summary-bar { grid-template-columns: repeat(3, 1fr); }
            .day-cell { min-height: 70px; padding: 4px; }
            .day-pnl { font-size: 12px; }
            .detail-panel { width: 95%; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>QuantBot <span style="font-size:12px;color:#8b949e">交易日历</span></h1>
        <a href="/">< 返回仪表盘</a>
    </div>

    <div class="nav-bar">
        <button class="nav-btn" onclick="prevMonth()">&lt; 上月</button>
        <div class="month-label" id="monthLabel">2026年3月</div>
        <button class="nav-btn" onclick="nextMonth()">下月 &gt;</button>
        <button class="nav-btn" onclick="goToday()">今天</button>
    </div>

    <div class="summary-bar">
        <div class="summary-card">
            <div class="label">月交易笔数</div>
            <div class="val" id="smCount">0</div>
        </div>
        <div class="summary-card">
            <div class="label">月净盈亏</div>
            <div class="val" id="smPnl">$0.00</div>
        </div>
        <div class="summary-card">
            <div class="label">胜率</div>
            <div class="val" id="smWinRate">--</div>
        </div>
        <div class="summary-card">
            <div class="label">盈利天数</div>
            <div class="val positive" id="smWinDays">0</div>
        </div>
        <div class="summary-card">
            <div class="label">亏损天数</div>
            <div class="val negative" id="smLossDays">0</div>
        </div>
    </div>

    <div class="calendar-grid">
        <div class="weekdays">
            <div class="weekday">一</div>
            <div class="weekday">二</div>
            <div class="weekday">三</div>
            <div class="weekday">四</div>
            <div class="weekday">五</div>
            <div class="weekday">六</div>
            <div class="weekday">日</div>
        </div>
        <div class="days" id="calendarDays"></div>
    </div>

    <div class="detail-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
        <div class="detail-panel">
            <div class="detail-header">
                <h2 id="detailTitle">2026-03-22 交易记录</h2>
                <button class="detail-close" onclick="closeDetail()">&times;</button>
            </div>
            <div class="detail-summary" id="detailSummary"></div>
            <div class="detail-body" id="detailBody"></div>
        </div>
    </div>

    <script>
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth(); // 0-based
        let calendarData = {};

        function monthStr(y, m) {
            return y + '-' + String(m + 1).padStart(2, '0');
        }

        function updateLabel() {
            document.getElementById('monthLabel').textContent =
                currentYear + '年' + (currentMonth + 1) + '月';
        }

        function prevMonth() {
            currentMonth--;
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            loadCalendar();
        }
        function nextMonth() {
            currentMonth++;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            loadCalendar();
        }
        function goToday() {
            const now = new Date();
            currentYear = now.getFullYear();
            currentMonth = now.getMonth();
            loadCalendar();
        }

        function loadCalendar() {
            updateLabel();
            const ms = monthStr(currentYear, currentMonth);
            fetch('/api/calendar?month=' + ms)
                .then(r => r.json())
                .then(data => {
                    calendarData = data;
                    renderCalendar();
                    renderSummary();
                })
                .catch(e => console.error('加载日历失败:', e));
        }

        function renderCalendar() {
            const container = document.getElementById('calendarDays');
            container.innerHTML = '';

            const firstDay = new Date(currentYear, currentMonth, 1);
            let startWeekday = firstDay.getDay(); // 0=Sun
            startWeekday = startWeekday === 0 ? 6 : startWeekday - 1; // Convert to Mon=0
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const today = new Date();
            const todayStr = today.getFullYear() + '-' +
                String(today.getMonth() + 1).padStart(2, '0') + '-' +
                String(today.getDate()).padStart(2, '0');

            // Empty cells before first day
            for (let i = 0; i < startWeekday; i++) {
                container.innerHTML += '<div class="day-cell empty"></div>';
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = currentYear + '-' +
                    String(currentMonth + 1).padStart(2, '0') + '-' +
                    String(d).padStart(2, '0');
                const info = calendarData[dateStr];
                let cls = 'day-cell';
                if (dateStr === todayStr) cls += ' today';
                if (info) {
                    cls += info.net_pnl >= 0 ? ' profit' : ' loss';
                } else {
                    cls += ' no-trade';
                }

                let inner = `<div class="day-num">${d}</div>`;
                if (info) {
                    const pnlCls = info.net_pnl >= 0 ? 'positive' : 'negative';
                    const sign = info.net_pnl >= 0 ? '+' : '';
                    inner += `<div class="day-pnl ${pnlCls}">${sign}$${info.net_pnl.toFixed(2)}</div>`;
                    inner += `<div class="day-count">${info.count} 笔</div>`;
                    inner += `<div class="day-wl"><span class="w">${info.wins}胜</span> <span class="l">${info.losses}负</span></div>`;
                }

                container.innerHTML += `<div class="${cls}" onclick="showDetail('${dateStr}')">${inner}</div>`;
            }
        }

        function renderSummary() {
            let totalCount = 0, totalPnl = 0, totalWins = 0, totalLosses = 0;
            let winDays = 0, lossDays = 0;
            for (const [day, info] of Object.entries(calendarData)) {
                totalCount += info.count;
                totalPnl += info.net_pnl;
                totalWins += info.wins;
                totalLosses += info.losses;
                if (info.net_pnl >= 0) winDays++;
                else lossDays++;
            }

            document.getElementById('smCount').textContent = totalCount;
            const pnlEl = document.getElementById('smPnl');
            pnlEl.textContent = (totalPnl >= 0 ? '+' : '') + '$' + totalPnl.toFixed(2);
            pnlEl.className = 'val ' + (totalPnl >= 0 ? 'positive' : 'negative');

            const total = totalWins + totalLosses;
            document.getElementById('smWinRate').textContent =
                total > 0 ? (totalWins / total * 100).toFixed(1) + '%' : '--';
            document.getElementById('smWinDays').textContent = winDays;
            document.getElementById('smLossDays').textContent = lossDays;
        }

        function showDetail(dateStr) {
            const info = calendarData[dateStr];
            if (!info || !info.trades || info.trades.length === 0) return;

            document.getElementById('detailTitle').textContent = dateStr + ' 交易记录';

            const sumEl = document.getElementById('detailSummary');
            const pnlCls = info.net_pnl >= 0 ? 'positive' : 'negative';
            sumEl.innerHTML = `
                <div class="item"><div class="label">交易笔数</div><div class="val">${info.count}</div></div>
                <div class="item"><div class="label">毛利</div><div class="val ${info.pnl >= 0 ? 'positive' : 'negative'}">${info.pnl >= 0 ? '+' : ''}$${info.pnl.toFixed(2)}</div></div>
                <div class="item"><div class="label">净盈亏</div><div class="val ${pnlCls}">${info.net_pnl >= 0 ? '+' : ''}$${info.net_pnl.toFixed(2)}</div></div>
                <div class="item"><div class="label">胜/负</div><div class="val"><span class="positive">${info.wins}</span> / <span class="negative">${info.losses}</span></div></div>
            `;

            const bodyEl = document.getElementById('detailBody');
            let rows = '';
            info.trades.forEach(t => {
                const dirCls = t.direction === 'LONG' ? 'dir-long' : 'dir-short';
                const dirTxt = t.direction === 'LONG' ? '做多' : '做空';
                const npCls = t.net_pnl >= 0 ? 'positive' : 'negative';
                rows += `<tr>
                    <td>${t.opened} - ${t.closed}</td>
                    <td>${t.symbol}</td>
                    <td class="${dirCls}">${dirTxt}</td>
                    <td>${t.setup}</td>
                    <td>${t.entry.toFixed(4)}</td>
                    <td>${t.exit.toFixed(4)}</td>
                    <td>${t.pnl_pct.toFixed(2)}%</td>
                    <td>${t.pnl >= 0 ? '+' : ''}$${t.pnl.toFixed(2)}</td>
                    <td style="color:#d29922">$${t.fees.toFixed(3)}</td>
                    <td style="color:#d29922">$${t.funding_fees.toFixed(3)}</td>
                    <td class="${npCls}">${t.net_pnl >= 0 ? '+' : ''}$${t.net_pnl.toFixed(2)}</td>
                    <td>${t.reason}</td>
                </tr>`;
            });
            bodyEl.innerHTML = `<table>
                <thead><tr>
                    <th>时间</th><th>币种</th><th>方向</th><th>策略</th>
                    <th>入场</th><th>出场</th><th>ROI</th><th>毛利</th>
                    <th>手续费</th><th>资金费</th><th>净盈亏</th><th>原因</th>
                </tr></thead>
                <tbody>${rows}</tbody>
            </table>`;

            document.getElementById('detailOverlay').classList.add('show');
        }

        function closeDetail() {
            document.getElementById('detailOverlay').classList.remove('show');
        }

        // ESC to close
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeDetail();
        });

        // Init
        loadCalendar();
    </script>
</body>
</html>
