# ============================================================
# 量化交易系统配置 V4-Lite
# ============================================================

account:
  balance: 2000
  leverage: 10
  margin_mode: isolated
  exchange: binance
  api_key: "${EXCHANGE_API_KEY}"
  api_secret: "${EXCHANGE_API_SECRET}"
  paper_trading: true   # 模拟交易模式，不实际下单

symbols:
  universe: 150
  scan_interval_sec: 120
  candidate_pool_size: 15
  min_listing_days: 7
  blacklist: []

timeframes:
  trend_tf: 1h
  entry_tf: 15m
  regime_tf_short: 1h
  regime_tf_long: 4h
  regime_reference: "BTC/USDT:USDT"

trend_filter:
  ema_fast: 20
  ema_mid: 50
  ema_slow: 200
  adx_period: 14
  adx_strong: 25
  adx_weak: 20

volatility_filter:
  atr_period: 14
  atrp_min_pct: 0.8
  atrp_max_pct: 4.5

liquidity_filter:
  min_24h_quote_volume: 5000000
  max_spread_pct: 0.15
  min_volume_ratio: 0.8

ranking:
  top_n: 15
  min_score: 60
  weights:
    ema_alignment: 30
    adx_strength: 25
    momentum: 20
    volume_expansion: 15
    liquidity: 10

risk:
  per_trade_risk_pct: 0.4
  daily_loss_limit_pct: 3.0
  daily_profit_target_pct: 5.0
  daily_profit_hard_stop_pct: 8.0
  max_consecutive_losses: 5
  cooldown_after_streak_min: 30
  max_open_positions: 4
  max_same_direction: 3
  max_single_margin_pct: 5.0
  max_total_margin_pct: 40.0
  same_symbol_daily_loss_pct: 1.0
  total_drawdown_stop_pct: 15.0
  weekly_loss_limit_pct: 8.0
  max_correlation: 0.75

execution:
  stop_atr_multiple: 1.2
  tp1_r: 1.5
  tp1_close_pct: 0.50
  tp2_r: 2.5
  tp2_close_pct: 0.50
  min_risk_reward: 1.8
  breakeven_after_r: 1.0
  trailing_enabled: true
  trailing_activate_r: 1.5
  trailing_lock_pct: 0.60
  time_stop_minutes: 60
  time_stop_min_r: 0.3

strategies:
  trend_follow:
    enabled: true
    regimes: [strong_trend_up, weak_trend_up, strong_trend_down, weak_trend_down]
  pullback_breakout:
    enabled: true
    regimes: [strong_trend_up, weak_trend_up, strong_trend_down, weak_trend_down]
  mean_reversion:
    enabled: true
    regimes: [ranging]
  volatility_breakout:
    enabled: true
    regimes: [ranging, weak_trend_up, weak_trend_down]
  funding_arbitrage:
    enabled: true
    regimes: [extreme_volatile, ranging]
    min_funding_rate: 0.001

regime:
  enabled: true
  update_interval_sec: 300

adaptive:
  enabled: true
  lookback_days: 7

economic_calendar:
  enabled: false

# ============================================================
# V4 增强模块
# ============================================================

orderbook:
  enabled: true
  wall_threshold: 3.0
  imbalance_min_ratio: 0.65
  analysis_zone_pct: 0.5
  depth_levels: 20

smart_order:
  enabled: true
  maker_wait_sec: 3
  chase_wait_sec: 3
  max_slippage_pct: 0.05
  post_only: true
  urgent_types: [stop_loss, liquidation_risk]

multi_exchange:
  enabled: true
  exchanges:
    - name: binance
      type: primary
    - name: bybit
      type: secondary
    - name: okx
      type: secondary
  update_interval_sec: 30
  consensus_reject_below: 0.3
  consensus_weak_below: 0.6

session:
  enabled: true
  zones:
    asia:
      utc_hours: [0,1,2,3,4,5,6,7]
      risk_per_trade_pct: 0.3
      max_positions: 2
      min_adx: 28
      min_score: 70
      min_volume_ratio: 0.6
    europe:
      utc_hours: [8,9,10,11,12,13,14,15]
      risk_per_trade_pct: 0.4
      max_positions: 3
      min_adx: 25
      min_score: 65
      min_volume_ratio: 0.8
    america:
      utc_hours: [16,17,18,19,20,21,22,23]
      risk_per_trade_pct: 0.4
      max_positions: 4
      min_adx: 25
      min_score: 60
      min_volume_ratio: 0.8

# ============================================================
# 基础设施
# ============================================================

database:
  postgres:
    host: localhost
    port: 5432
    db: quant_trading
    user: "${DB_USER}"
    password: "${DB_PASSWORD}"
  redis:
    host: localhost
    port: 6379
    db: 0

logging:
  level: INFO
  file: logs/trading.log
  max_size_mb: 100
  backup_count: 10

alerts:
  telegram:
    enabled: false
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"
    notify_on: [trade_open, trade_close, daily_report, risk_alert, error]
