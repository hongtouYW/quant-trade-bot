<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Flash Quant - 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, monospace;
               display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box { background: #161b22; border: 1px solid #30363d; border-radius: 12px;
                     padding: 40px; width: 360px; }
        h1 { font-size: 24px; margin-bottom: 8px; }
        h1 span { color: #f0883e; }
        p { color: #8b949e; font-size: 13px; margin-bottom: 24px; }
        label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 4px; }
        input { width: 100%; padding: 10px 12px; background: #0d1117; border: 1px solid #30363d;
                border-radius: 6px; color: #c9d1d9; font-size: 14px; margin-bottom: 16px; }
        input:focus { outline: none; border-color: #58a6ff; }
        button { width: 100%; padding: 10px; background: #238636; border: none; border-radius: 6px;
                 color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
        button:hover { background: #2ea043; }
        .error { color: #f85149; font-size: 13px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Flash<span>Quant</span></h1>
        <p>爆发性信号量化交易系统</p>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST">
            <label>用户名</label>
            <input type="text" name="username" autofocus>
            <label>密码</label>
            <input type="password" name="password">
            <button type="submit">登录</button>
        </form>
    </div>
</body>
</html>
