{include file="public/header" /}
<body>
<div class="layui-fluid">
    <div class="layui-row">
        <form class="layui-form">
            <input type="hidden" name="id" value="{$info.id}">
            <div class="layui-form-item">
                <label class="layui-form-label">
                    <span class="x-red">*</span>标题
                </label>
                <div class="layui-input-inline">
                    <input type="text" required="" lay-verify="required"   name="name" value="{$info.name}"
                           autocomplete="off" class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">
                    <span class="x-red">*</span>英文标题
                </label>
                <div class="layui-input-inline">
                    <input type="text" required="" lay-verify="required"   name="name_en" value="{$info.name_en}"
                           autocomplete="off" class="layui-input">
                </div>
            </div>

            <!-- <div class="layui-form-item">
                <label class="layui-form-label">
                    <span class="x-red">*</span>俄语标题
                </label>
                <div class="layui-input-inline">
                    <input type="text" required="" lay-verify="required"   name="name_ru" value="{$info.name_ru}"
                           autocomplete="off" class="layui-input">
                </div>
            </div> -->

            <!-- Category Dropdown -->
            <div class="layui-form-item">
                <label class="layui-form-label">种类</label>
                <div class="layui-input-inline">
                    <select name="category" lay-verify="" lay-search="">
                        <option value="">请选择种类</option>
                        {volist name="category" id="vo"}
                        <option value="{$vo.id}" {$info.category == $vo.id ? 'selected' : ''}>
                            {$vo.name}
                        </option>
                        {/volist}
                    </select>
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label">
                    <span class="x-red">*</span>缩略图
                </label>
                <div class="layui-input-inline">
                    <input type="text" id="image" name="image" value="{$info.image}"  style="width: 400px" class="layui-input" onchange="change()">
                    <img style="width: 80px;height: 80px"  class="image" id="img1" src="{$img_url}{$info.image}" />
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label">
                    <span class="x-red"></span>状态</label>
                <div class="layui-input-block">
                    <input type="radio" name="is_show" value="1" title="开启" {if condition="$info.is_show eq 1 "}checked{/if}>
                    <input type="radio" name="is_show" value="0" title="停用" {if condition="$info.is_show eq 0 "}checked{/if}>
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label">
                    <span class="x-red"></span>显示首页</label>
                <div class="layui-input-block">
                    <input type="radio" name="is_menu" value="1" title="开启" {if condition="$info.is_menu eq 1 "}checked{/if}>
                    <input type="radio" name="is_menu" value="0" title="停用" {if condition="$info.is_menu eq 0 "}checked{/if}>
                </div>
            </div>


            <div class="layui-form-item">
                <label class="layui-form-label">
                    <span class="x-red"></span>排序</label>
                <div class="layui-input-inline">
                    <input type="number"min="0" name="sort"  edit="text" autocomplete="off" value="{$info.sort}" class="layui-input">
                </div>
                <div class="layui-form-mid layui-word-aux">
                    <span class="x-red"></span>不填默认为99
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label">
                </label>
                <button  class="layui-btn"  lay-submit="sub"  lay-filter="sub">
                    保存
                </button>
            </div>
        </form>
    </div>
</div>
<script>layui.use(['form', 'layer'],
    function() {
        $ = layui.jquery;
        var form = layui.form,
            layer = layui.layer;
        form.verify({
            required: [/[\S]+/, "必填项不能为空"],
        });

        form.on('submit(sub)', function (data) {
            $.ajax({
                url: "{:url('info')}",
                type: "POST",
                data: data.field,
                async: false,
                success: function (data) {
                    console.log(data);
                    if(data.code==1){
                        layer.msg(data.msg,{icon:1});
                        setTimeout(function () {
                            parent.layer.closeAll();
                            parent.location.reload();
                        },1500);
                    }else{
                        layer.msg(data.msg,{icon:2});
                    }
                },
                error: function () {
                    layer.msg("System Service Busy!", {offset: '200px'});
                }
            });
            return false;
        });

    });

    function change() {
        var img_url = "{$img_url}";
        var src=$("#image").val();
        $('#img1').attr("src", img_url+src)//这时写地址
    }

</script>
</body>

</html>
