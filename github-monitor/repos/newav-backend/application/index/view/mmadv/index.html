{include file="public/header" /}
<body>
<div class="layui-fluid">

    <div class="x-nav">
      <a class="layui-btn layui-btn-small" style="line-height:1.6em;margin-top:3px;float:right" onclick="location.reload()" title="刷新">
        <i class="layui-icon layui-icon-refresh" style="line-height:30px"></i>
      </a>
    </div>

    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-body ">
                    <form class="layui-form layui-col-space5" action="">
                        <div class="layui-input-inline layui-show-xs-block">
                          <input type="text" name="wd" placeholder="请输入视频名称"  value="{$param['wd']}" autocomplete="off" class="layui-input">
                        </div>


                        <div class="layui-input-inline layui-show-xs-block">
                            <input type="submit" class="layui-btn"  value="搜索">
                        </div>
                    </form>
                </div>
              <div class="layui-card-header">
                <button class="layui-btn" onclick="set_add()">
                  <i class="layui-icon"></i>添加</button>
              </div>
                <div class="layui-card-body ">
                    <table class="layui-table layui-form">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th style="width: 200px">视频名称</th>
                            <th>封面</th>
                          <th style="width: 400px">操作</th></tr>
                        </thead>
                        <tbody>
                        {volist name="list" id="vo"}
                        <tr>
                            <td>{$vo.id}</td>
                            <td>{$vo.title}</td>
                            <td><div style="height:70px;width:70px;cursor:pointer;" onclick="show_img(this)"><img style="width: 100%;height: 100%" src="{$vo.thumb}"></div></td>
                            <td class="td-manage">
                                <button class="layui-btn layui-btn layui-btn-primary"  data-url="{$video_host}{$vo.video_url}" onclick="testPlay(this)" >测试播放</button>
                            </td>
                        </tr>
                        {/volist}
                        </tbody>
                    </table>
                </div>
                <div class="layui-card-body ">

                    <div id="pages" class="center"></div>

                </div>
            </div>
        </div>
    </div>
</div>
</body>

<script>
layui.use(['laydate', 'form'],
    function() {
      $ = layui.jquery;
      var form = layui.form,
          layer = layui.layer;

      var curUrl="{:url('index',$param)}";
      layui.use(['laypage', 'layer'], function() {
        var laypage = layui.laypage
            , layer = layui.layer,
            $ = layer.jquery;
        laypage.render({
          elem: 'pages'
          ,count: {$total}
          ,limit: {$limit}
          ,limits:[10,20,50,100]
          ,curr: {$page}
          ,layout: ['count', 'prev', 'page', 'next', 'limit', 'skip']
          ,jump: function(obj,first){
            if(!first){
              location.href = curUrl.replace('%7Bpage%7D',obj.curr).replace('%7Blimit%7D',obj.limit);
            }
          }
        });
      });

    });






  //图片显示
    function show_img(t) {
      var t = $(t).find("img");
      //页面层
      layer.open({
        type: 1,
        skin: 'layui-layer-rim', //加上边框
        area: ['75%', '85%'], //宽高
        shadeClose: true, //开启遮罩关闭
        end: function (index, layero) {
          return false;
        },
        content: '<div style="text-align:center"><img src="' + $(t).attr('src') + '" /></div>'
      });
    }


  /*
  添加
   */
  function set_add() {
    var url='{:url("add")}';
    var add = layer.open({
      type: 2,
      title: '添加广告',
      area: ['100%', '100%'],
      content: url, //iframe的url
    });
    layer.full(add)
  }


  /*
  测试播放
  */
  function testPlay(t) {
    var url=$(t).attr("data-url");

    if(url == '' || url == 'undefined'){
      layer.msg('测试url为空',{icon:2});
      return ;
    }
    var url='{:url("testplay")}'+'?url='+url;
    layer.open({
      type: 2,
      title: '测试播放',
      shadeClose: true,
      shade: 0.8,
      area: ['40%', '60%'],
      content: url, //iframe的url
    });
  }

</script>
</html>
