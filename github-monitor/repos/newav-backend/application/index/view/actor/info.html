{include file="public/header" /}
<body>
<div class="layui-fluid">
    <div class="layui-row">
        <form class="layui-form">
            <input type="hidden" name="id" value="{$info.id}">
            <div class="layui-form-item">
                <label class="layui-form-label">
                    <span class="x-red">*</span>原名称
                </label>
                <div class="layui-input-inline">
                    <input type="text" required="" lay-verify="required"   name="name" value="{$info.name}"
                           autocomplete="off" class="layui-input">
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label">
                    <span class="x-red">*</span>中文名称
                </label>
                <div class="layui-input-inline">
                    <input type="text" required="" lay-verify="required"   name="name_zh" value="{$info.name_zh}" autocomplete="off" class="layui-input">
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label">
                    <span class="x-red">*</span>英文名称
                </label>
                <div class="layui-input-inline">
                    <input type="text" required="" lay-verify="required"   name="name_en" value="{$info.name_en}" autocomplete="off" class="layui-input">
                </div>
            </div>
<!-- 
            <div class="layui-form-item">
                <label class="layui-form-label">
                    <span class="x-red">*</span>俄语名称
                </label>
                <div class="layui-input-inline">
                    <input type="text" required="" lay-verify="required"   name="name_ru" value="{$info.name_ru}"
                           autocomplete="off" class="layui-input">
                </div>
            </div> -->

            <div class="layui-form-item">
                <label class="layui-form-label">
                    首字母
                </label>
                <div class="layui-input-inline">
                    <input type="text"  name="initial" value="{$info.initial}"
                           autocomplete="off" class="layui-input">
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label">
                    <span class="x-red">*</span>缩略图
                </label>
                <div class="layui-input-inline">
                    <input type="text" id="image" name="image" value="{$info.image}"   style="width: 400px" class="layui-input" onchange="change()">
                    <img style="width: 80px;height: 80px"  class="image" id="img1" src="{$img_url}{$info.image}" />
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label">
                    <span class="x-red">*</span>背景图
                </label>
                <div class="layui-input-inline">
                    <input type="text" id="background_image" name="background_image" value="{$info.background_image}"   style="width: 400px" class="layui-input" onchange="change()">
                    <img style="width: 80px;height: 80px"  class="background_image" id="background_image1" src="{$img_url}{$info.background_image}" />
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label">对应动态ID：</label>
                <div class="layui-input-inline">
                    <input type="text" id="tid" class="layui-input" value="{$info.tid}" placeholder="动态id" name="tid">
                </div>
                <div class="layui-input-inline">
                    <a class="layui-btn selectTrend"  title="查询动态">查询动态</a>
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label">
                    <span class="x-red"></span>状态</label>
                <div class="layui-input-block">
                    <input type="radio" name="is_show" value="1" title="开启" {if condition="$info.is_show eq 1 "}checked{/if}>
                    <input type="radio" name="is_show" value="0" title="停用" {if condition="$info.is_show eq 0 "}checked{/if}>
                </div>
            </div>


            <div class="layui-form-item">
                <label class="layui-form-label">
                    <span class="x-red"></span>排序</label>
                <div class="layui-input-inline">
                    <input type="number"min="0" name="sort"  edit="text" autocomplete="off" value="{$info.sort}" class="layui-input">
                </div>
                <div class="layui-form-mid layui-word-aux">
                    <span class="x-red"></span>不填默认为99
                </div>
            </div>
            


            <div class="layui-form-item">

                <label class="layui-form-label"><span class="x-red"></span>生日</label>
                <div class="layui-input-inline">
                  <input type="date" name="birthday" value="{$info.birthday}"  autocomplete="off" class="layui-input">
                </div>
                <label class="layui-form-label"><span class="x-red"></span>出道日期</label>
                <div class="layui-input-inline">
                  <input type="date" name="debut" value="{$info.debut}"  autocomplete="off" class="layui-input">
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label"><span class="x-red"></span>身高</label>
                <div class="layui-input-inline">
                    <input type="number" name="height" value="{$info.height}"  autocomplete="off" class="layui-input">
                </div>
                <label class="layui-form-label">
                    <span class="x-red">*</span>罩杯</label>
                <div class="layui-input-inline">
                    <select name="bra_size">
                        <option value="">罩杯</option>
                        <option value="A" {if condition="$info['bra_size'] eq 'A' "}selected {/if}>A</option>
                        <option value="B" {if condition="$info['bra_size'] eq 'B' "}selected {/if}>B</option>
                        <option value="C" {if condition="$info['bra_size'] eq 'C' "}selected {/if}>C</option>
                        <option value="D" {if condition="$info['bra_size'] eq 'D' "}selected {/if}>D</option>
                        <option value="E" {if condition="$info['bra_size'] eq 'E' "}selected {/if}>E</option>
                        <option value="F" {if condition="$info['bra_size'] eq 'F' "}selected {/if}>F</option>
                        <option value="G" {if condition="$info['bra_size'] eq 'G' "}selected {/if}>G</option>
                        <option value="H" {if condition="$info['bra_size'] eq 'H' "}selected {/if}>H</option>
                        <option value="I" {if condition="$info['bra_size'] eq 'I' "}selected {/if}>I</option>
                        <option value="J" {if condition="$info['bra_size'] eq 'J' "}selected {/if}>J</option>
                        <option value="K" {if condition="$info['bra_size'] eq 'K' "}selected {/if}>K</option>
                        <option value="L" {if condition="$info['bra_size'] eq 'L' "}selected {/if}>L</option>
                        <option value="M" {if condition="$info['bra_size'] eq 'M' "}selected {/if}>M</option>
                        <option value="N" {if condition="$info['bra_size'] eq 'N' "}selected {/if}>N</option>
                        <option value="O" {if condition="$info['bra_size'] eq 'O' "}selected {/if}>O</option>
                        <option value="P" {if condition="$info['bra_size'] eq 'P' "}selected {/if}>P</option>
                        <option value="Q" {if condition="$info['bra_size'] eq 'Q' "}selected {/if}>Q</option>
                    </select>
                </div>
            </div>


            <div class="layui-form-item">

                <label class="layui-form-label"><span class="x-red"></span>胸围</label>
                <div class="layui-input-inline">
                  <input type="number" name="bust" value="{$info.bust}"  autocomplete="off" class="layui-input">
                </div>

                <label class="layui-form-label"><span class="x-red"></span>腰围</label>
                <div class="layui-input-inline">
                  <input type="number" name="waist" value="{$info.waist}"  autocomplete="off" class="layui-input">
                </div>
                <label class="layui-form-label"><span class="x-red"></span>臀围</label>
                <div class="layui-input-inline">
                  <input type="number" name="hip" value="{$info.hip}"  autocomplete="off" class="layui-input">
                </div>
            </div>

            <!-- Blood Type Dropdown -->
            <div class="layui-form-item">
                <label class="layui-form-label">血型</label>
                <div class="layui-input-inline">
                    <select name="blood_type" lay-verify="" lay-search="">
                        <option value="">请选择血型</option>
                        {volist name="bloodTypes" id="vo"}
                        <option value="{$vo.id}" {$info.blood_type == $vo.id ? 'selected' : ''}>
                            {$vo.name}
                        </option>
                        {/volist}
                    </select>
                </div>
            </div>

            <!-- Nationality Dropdown -->
            <div class="layui-form-item">
                <label class="layui-form-label">国籍</label>
                <div class="layui-input-inline">
                    <select name="nationality" lay-verify="" lay-search="">
                        <option value="">请选择国籍</option>
                        {volist name="nationalities" id="vo"}
                        <option value="{$vo.id}" {$info.nationality == $vo.id ? 'selected' : ''}>
                            {$vo.name}
                        </option>
                        {/volist}
                    </select>
                </div>
            </div>

            <!-- Constellation Dropdown -->
            <div class="layui-form-item">
                <label class="layui-form-label">星座</label>
                <div class="layui-input-inline">
                    <select name="constellation" lay-verify="" lay-search="">
                        <option value="">请选择星座</option>
                        {volist name="constellations" id="vo"}
                        <option value="{$vo.id}" {$info.constellation == $vo.id ? 'selected' : ''}>
                            {$vo.name}
                        </option>
                        {/volist}
                    </select>
                </div>
            </div>

            <div class="layui-form-item layui-form-text">
                <label class="layui-form-label">简介</label>
                <div  class="layui-input-block">
                    <textarea  name="desc" placeholder="请输入简介" class="layui-textarea">{$info.desc}</textarea>
                </div>
            </div>


            <div class="layui-form-item layui-form-text">
                <label class="layui-form-label">英文简介</label>
                <div class="layui-input-block">
                    <textarea name="desc_en" placeholder="请输入英文简介" class="layui-textarea">{$info.desc_en}</textarea>
                </div>
            </div>

            <div class="layui-form-item layui-form-text">
                <label class="layui-form-label">俄语简介</label>
                <div class="layui-input-block">
                    <textarea name="desc_ru" placeholder="请输入俄语简介" class="layui-textarea">{$info.desc_ru}</textarea>
                </div>
            </div>
            
            <!-- social media part -->
            <fieldset class="layui-elem-field layui-field-title" style="margin-top: 20px;">
                <legend>社交媒体账号</legend>
            </fieldset>
            <div class="layui-form-item">
                <label class="layui-form-label"><i class="layui-icon layui-icon-login-weibo" style="color: #1da1f2;"></i> Twitter</label>
                <div class="layui-input-inline">
                    <input type="text" name="twitter" value="{$info.twitter}" autocomplete="off" placeholder="Twitter 用户名" class="layui-input">
                </div>

                <label class="layui-form-label"><i class="layui-icon layui-icon-camera" style="color: #e4405f;"></i> Instagram</label>
                <div class="layui-input-inline">
                    <input type="text" name="instagram" value="{$info.instagram}" autocomplete="off" placeholder="Instagram 用户名" class="layui-input">
                </div>

                <label class="layui-form-label"><i class="layui-icon layui-icon-video" style="color: #000000;"></i> TikTok</label>
                <div class="layui-input-inline">
                    <input type="text" name="tiktok" value="{$info.tiktok}" autocomplete="off" placeholder="TikTok 用户名" class="layui-input">
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label"><i class="layui-icon layui-icon-heart" style="color: #ff6b6b;"></i> Fantia</label>
                <div class="layui-input-inline">
                    <input type="text" name="fantia" value="{$info.fantia}" autocomplete="off" placeholder="Fantia 链接" class="layui-input">
                </div>

                <label class="layui-form-label"><i class="layui-icon layui-icon-diamond" style="color: #f96854;"></i> Patreon</label>
                <div class="layui-input-inline">
                    <input type="text" name="patreon" value="{$info.patreon}" autocomplete="off" placeholder="Patreon 链接" class="layui-input">
                </div>

                <label class="layui-form-label"><i class="layui-icon layui-icon-fire" style="color: #ff0000;"></i> OnlyFans</label>
                <div class="layui-input-inline">
                    <input type="text" name="onlyfans" value="{$info.onlyfans}" autocomplete="off" placeholder="OnlyFans 链接" class="layui-input">
                </div>
            </div>
            
            <div class="layui-form-item">
                <label class="layui-form-label"><i class="layui-icon layui-icon-video" style="color: #ff0000;"></i> YouTube</label>
                <div class="layui-input-inline">
                    <input type="text" name="youtube" value="{$info.youtube}" autocomplete="off" placeholder="YouTube 频道/用户名" class="layui-input">
                </div>

                <label class="layui-form-label"><i class="layui-icon layui-icon-fonts-del" style="color: #000000;"></i> X</label>
                <div class="layui-input-inline">
                    <input type="text" name="x_platform" value="{$info.x_platform}" autocomplete="off" placeholder="X (Twitter) 用户名" class="layui-input">
                </div>

                <label class="layui-form-label"><i class="layui-icon layui-icon-facebook-fill" style="color: #1877f2;"></i> Facebook</label>
                <div class="layui-input-inline">
                    <input type="text" name="facebook" value="{$info.facebook}" autocomplete="off" placeholder="Facebook 用户名" class="layui-input">
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label">
                </label>
                <button  class="layui-btn"  lay-submit="sub"  lay-filter="sub">
                    保存
                </button>
            </div>
        </form>
    </div>
</div>
<script>layui.use(['form', 'layer'],
    function() {
        $ = layui.jquery;
        var form = layui.form,
            layer = layui.layer;
        form.verify({
            required: [/[\S]+/, "必填项不能为空"],
        });

        form.on('submit(sub)', function (data) {
            $.ajax({
                url: "{:url('info')}",
                type: "POST",
                data: data.field,
                async: false,
                success: function (data) {
                    console.log(data);
                    if(data.code==1){
                        layer.msg(data.msg,{icon:1});
                        setTimeout(function () {
                            parent.layer.closeAll();
                            parent.location.reload();
                        },1500);
                    }else{
                        layer.msg(data.msg,{icon:2});
                    }
                },
                error: function () {
                    layer.msg("System Service Busy!", {offset: '200px'});
                }
            });
            return false;
        });

    });



    // 选择标签
    $('.selectTrend').click(function () {
        show_trend();
    })

    function show_trend() {
        var url='{:url("trend_list")}';
        layer.open({
            type: 2,
            title: '动态列表',
            shadeClose: true,
            shade: 0.8,
            area: ['90%', '90%'],
            content: url, //iframe的url
        });
    }         

    /**
     * 获取子页面传递过来的分类参数
     * @param obj  分类id
     */
    function GetValue(tid){
        $('#tid').val(tid);
    }
</script>
</body>

</html>
