{include file="public/header" /}
<body>
<div class="x-nav">
    <span class="layui-breadcrumb">
        <a>演员管理</a>
        <a><cite>演员列表</cite></a>
    </span>
</div>
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-body">
                    <!-- 添加搜索表单 -->
                    <form class="layui-form" action="">
                        <div class="layui-form-item">
                            <div class="layui-inline">
                                <label class="layui-form-label">演员ID</label>
                                <div class="layui-input-inline">
                                    <input type="text" name="id" placeholder="请输入演员ID" autocomplete="off" class="layui-input">
                                </div>
                            </div>
                            <div class="layui-inline">
                                <label class="layui-form-label">演员名称</label>
                                <div class="layui-input-inline">
                                    <input type="text" name="wd" placeholder="请输入演员名称" autocomplete="off" class="layui-input">
                                </div>
                            </div>
                            <div class="layui-inline">
                                <button class="layui-btn" lay-submit lay-filter="searchForm">搜索</button>
                            </div>
                        </div>
                    </form>
                    
                    <table class="layui-table" id="actor_table" lay-filter="actor_table"></table>
                    
                    <!-- 添加已选演员显示区域 -->
                    <div class="layui-form-item">
                        <label class="layui-form-label">已选演员</label>
                        <div class="layui-input-block" id="selectedActors"></div>
                    </div>
                    
                    <!-- 添加提交按钮 -->
                    <div class="layui-form-item">
                        <div class="layui-input-block">
                            <button class="layui-btn" onclick="submitSelected()">确认选择</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>

<script>
// 将 selectedActorsData 移到全局作用域
var selectedActorsData = {};

layui.use(['table', 'form'], function(){
    var table = layui.table;
    var form = layui.form;
    
    // 初始化表格
    table.render({
        elem: '#actor_table'
        ,url: '{:url("actor_list")}' 
        ,page: true
        ,cols: [[
            {type: 'checkbox'}
            ,{field: 'id', title: 'ID', width:80, sort: true}
            ,{field: 'name', title: '名称'}
        ]]
        ,done: function(res) {
            // 恢复之前的选中状态
            var tableDiv = $('#actor_table').next('.layui-table-view');
            var tableBody = tableDiv.find('.layui-table-body table tbody');
            
            tableBody.children('tr').each(function() {
                var id = $(this).find('td[data-field="id"]').text();
                if(selectedActorsData[id]) {
                    $(this).find('td .layui-form-checkbox').addClass('layui-form-checked');
                }
            });
        }
    });
    
    // 监听复选框选择
    table.on('checkbox(actor_table)', function(obj){
        if(obj.type === 'one') {
            if(obj.checked) {
                selectedActorsData[obj.data.id] = obj.data;
            } else {
                delete selectedActorsData[obj.data.id];
            }
        } else if(obj.type === 'all') {
            var tableData = table.cache['actor_table'];
            tableData.forEach(function(item) {
                if(obj.checked) {
                    selectedActorsData[item.id] = item;
                } else {
                    delete selectedActorsData[item.id];
                }
            });
        }
        updateSelectedActorsDisplay();
    });
    
    // 监听搜索表单提交
    form.on('submit(searchForm)', function(data){
        table.reload('actor_table', {
            where: data.field
        });
        return false;
    });
});

// 更新已选择的演员显示
function updateSelectedActorsDisplay() {
    var html = '';
    for(var id in selectedActorsData) {
        html += '<span class="layui-badge layui-bg-green" style="margin-right: 10px;">' + 
                selectedActorsData[id].name + 
                '<i class="layui-icon layui-icon-close" style="margin-left: 5px;cursor:pointer;" onclick="removeSelected(' + id + ')"></i>' +
                '</span>';
    }
    $('#selectedActors').html(html);
}

// 移除已选择的演员
function removeSelected(id) {
    delete selectedActorsData[id];
    updateSelectedActorsDisplay();
    // 更新表格中的选中状态
    var tableDiv = $('#actor_table').next('.layui-table-view');
    var tableBody = tableDiv.find('.layui-table-body table tbody');
    tableBody.find('tr').each(function() {
        var rowId = $(this).find('td[data-field="id"]').text();
        if(rowId == id) {
            $(this).find('td .layui-form-checkbox').removeClass('layui-form-checked');
        }
    });
}

// 获取选中的演员
function getSelectedActors() {
    var ids = [];
    var names = [];
    
    for(var id in selectedActorsData) {
        ids.push(selectedActorsData[id].id);
        names.push(selectedActorsData[id].name);
    }
    
    return {
        ids: ids,
        names: names
    };
}

// 提交选中的演员
function submitSelected() {
    var selected = getSelectedActors();
    if(selected.ids.length === 0) {
        layer.msg('请至少选择一个演员');
        return;
    }
    
    // 将选中的数据传递给父窗口的回调函数
    var index = parent.layer.getFrameIndex(window.name);
    parent.handleSelectedActors(selected);
    parent.layer.close(index);
}
</script>
</html>
