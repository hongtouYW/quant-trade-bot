{include file="public/header" /}

<body>
<div class="x-nav">
  <a class="layui-btn layui-btn-small" style="line-height:1.6em;margin-top:3px;float:right" onclick="location.reload()" title="刷新">
    <i class="layui-icon layui-icon-refresh" style="line-height:30px"></i>
  </a>
</div>
<div class="layui-fluid">
  <div class="layui-row layui-col-space15">
    <div class="layui-col-md12">
      <div class="layui-card">
        <div class="layui-card-body ">
          <form class="layui-form layui-col-space5">
            <div class="layui-input-inline layui-show-xs-block">
              <select name="pid">
                <option value="">支付渠道</option>
                <option value="1" {if condition="$param['pid'] eq '1'"}selected {/if}>唐朝</option>
                <option value="3" {if condition="$param['pid'] eq '3'"}selected {/if}>永付</option>
                <option value="4" {if condition="$param['pid'] eq '4'"}selected {/if}>楹联</option>
                <option value="4" {if condition="$param['pid'] eq '5'"}selected {/if}>Tai</option>
              </select>
            </div>

            <div class="layui-input-inline layui-show-xs-block">
              <input autocomplete="off" class="layui-input" placeholder="开始日" value="{$param['start']}" name="start" id="start">
            </div>
            <div class="layui-input-inline layui-show-xs-block">
              <input autocomplete="off" class="layui-input" placeholder="截止日" value="{$param['end']}" name="end" id="end">
            </div>

            <div class="layui-input-inline layui-show-xs-block">
              <input type="submit" class="layui-btn"  value="搜索">
            </div>
          </form>
        </div>


<!--        <div class="layui-card-header">
          <span>总成功笔数:{$pay_num}</span>
          <span>总成功金额:{$pay_total}</span>
        </div>-->

        <div class="layui-card-body ">
          <table class="layui-table layui-form">
            <thead>
            <tr>
              <th>日期</th>
              <th>支付渠道</th>
              <th>成功笔数</th>
              <th>总成功金额</th>
            </thead>
            <tbody>
            {volist name="list" id="vo"}
            <tr>
              <td>{$vo.date}</td>
              <td>{$vo.pid}</td>
              <td>{$vo.pay_num}</td>
              <td>{$vo.pay_total}</td>
            </tr>
            {/volist}
            </tbody>
          </table>
        </div>
        <div class="layui-card-body ">
          <div id="pages" class="center"></div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
<script>
layui.use(['laydate', 'form'],

    function() {
      $ = layui.jquery;
      var form = layui.form,
          layer = layui.layer;

      var laydate = layui.laydate;
      //执行一个laydate实例
      laydate.render({
        elem: '#start' //指定元素
      });
      //执行一个laydate实例
      laydate.render({
        elem: '#end' //指定元素
      });

      var curUrl="{:url('index',$param)}";
      layui.use(['laypage', 'layer'], function() {
        var laypage = layui.laypage
            , layer = layui.layer,
            $ = layer.jquery;
        laypage.render({
          elem: 'pages'
          ,count: {$total}
          ,limit: {$limit}
          ,limits:[10,20,50,100]
          ,curr: {$page}
          ,layout: ['count', 'prev', 'page', 'next', 'limit', 'skip']
          ,jump: function(obj,first){
            if(!first){
              location.href = curUrl.replace('%7Bpage%7D',obj.curr).replace('%7Blimit%7D',obj.limit);
            }
          }
        });
      });
    });


    /*
    删除
    */
    function set_del(t) {
      var id = $(t).attr("id-data");
      layer.confirm('你确定要删除么？', {
        btn: ['确定', '取消'] //可以无限个按钮
      }, function (index, layero) {
        //按钮【按钮一】的回调
        $.post('{:url("del")}', {'id': id}, function (data) {
          if (data.code == 1) {
            layer.msg(data.msg, {icon: 1});
            setTimeout(function () {
              location.reload();
            }, 1500);
          } else {
            layer.alert(data.msg, {icon: 2});
          }
        });

      }, function (index) {
        //按钮【按钮二】的回调
      });
    }
</script>
</html>
