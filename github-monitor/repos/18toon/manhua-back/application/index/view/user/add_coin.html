{include file="public/header" /}
<body>
<div class="layui-fluid">
  <div class="layui-row">
    <form class="layui-form">
      <input type="hidden" id="id" value="{$find.id}">
      <div class="layui-form-item">
        <label  class="layui-form-label">id</label>
        <div class="layui-input-inline">
          <input type="text" disabled value="{$find.id}" autocomplete="off" class="layui-input" />
        </div>
      </div>

      <div class="layui-form-item">
        <label  class="layui-form-label">用户名</label>
        <div class="layui-input-inline">
          <input type="text" disabled value="{$find.username}" autocomplete="off" class="layui-input" />
        </div>
      </div>

      <div class="layui-form-item">
        <label  class="layui-form-label">当前钻石</label>
        <div class="layui-input-inline">
          <input type="text" disabled value="{$find.coin}" autocomplete="off" class="layui-input" />
        </div>
      </div>

      <div class="layui-form-item">
        <label class="layui-form-label">
          增加钻石
        </label>
        <div class="layui-input-inline">
          <input type="number" min="0" id="coin"  required="" autocomplete="off" class="layui-input">
        </div>
      </div>

      <div class="layui-form-item">
        <label class="layui-form-label">
        </label>
        <button  class="layui-btn"  lay-submit="sub"  lay-filter="sub">
          提交
        </button>
      </div>

    </form>
  </div>
</div>
<script>layui.use(['form', 'layer'],
        function() {
          $ = layui.jquery;
          var form = layui.form,
                  layer = layui.layer;

          form.verify({
            required: [/[\S]+/, "必填项不能为空"],
          });

          form.on('submit(sub)', function (data) {
            var id = $("#id").val();
            var coin = $("#coin").val();
            $.ajax({
              url: "{:url('user/add_coin')}",
              type: "POST",
              data: {
                id: id,
                coin: coin,
              },
              async: false,
              success: function (data) {
                console.log(data);
                if(data.code==1){
                  layer.msg(data.msg,{icon:1});
                  setTimeout(function () {
                    parent.layer.closeAll();
                    parent.location.reload();
                  },1500);
                }else{
                  layer.msg(data.msg,{icon:2});
                }
              },
              error: function () {
                layer.msg("System Service Busy!", {offset: '200px'});
              }
            });
            return false;
          });

        });
</script>
</body>

</html>

</body>
</html>
