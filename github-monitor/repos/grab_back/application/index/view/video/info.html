{include file="public/header" /}
<style>

    .x-admin-sm .layui-btn-xs {
        height: 22px;
        line-height: 22px;
        padding: 0 5px;
        font-size: 12px;
    }
</style>

<body>
<div class="layui-fluid">
    <div class="layui-row">
        <form class="layui-form">
            <input type="hidden" name="id" value="{$info.id}">
            <div class="layui-form-item">
                <label class="layui-form-label">扩展分类：</label>
                <div class="layui-input-block">
                    {volist name="tagList" id="vo"}
                        <input type="checkbox" name="tags[]" value="{$vo.id}"  {in name="vo.id" value="$info.tags"} checked="checked"{/in} lay-skin="primary"  title="{$vo.name}">
                    {/volist}
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">视频权限</label>
                <div class="layui-input-block">
                    <input type="radio" name="private"  value="0" title="免费观看" {if condition="$info.private eq 0 "}checked{/if}>
                    <input type="radio" name="private"  value="1" title="注册观看" {if condition="$info.private eq 1 "}checked{/if}>
                    <input type="radio" name="private"  value="2" title="VIP观看" {if condition="$info.private eq 2 "}checked{/if}>
                </div>
            </div>

            <div class="layui-form-item center">
                <div class="layui-input-block">
                    <button  class="layui-btn"  lay-submit="sub"  lay-filter="sub">
                        保存
                    </button>
                </div>
            </div>
        </form>
        </div>
        </div>

<script>
    layui.use(['form', 'layer'], function () {
    // 操作对象
    var form = layui.form
        , layer = layui.layer
        , $ = layui.jquery
        , upload = layui.upload;;

    // 验证
        form.verify({
            required: [/[\S]+/, "必填项不能为空"],
        });

        form.on('submit(sub)', function (data) {
            console.log(data.field);
            $.ajax({
                url: "{:url('info')}",
                type: "POST",
                data: data.field,
                async: false,
                success: function (data) {
                    if(data.code==1){
                        layer.msg(data.msg,{icon:1});
                        setTimeout(function () {
                            parent.layer.closeAll();
                            parent.location.reload();
                        },1500);
                    }else{
                        layer.msg(data.msg,{icon:2});
                    }
                },
                error: function () {
                    layer.msg("System Service Busy!", {offset: '200px'});
                }
            });
            return false;
        });

    });

</script>

</body>

</html>
