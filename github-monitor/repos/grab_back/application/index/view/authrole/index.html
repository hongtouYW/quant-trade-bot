{include file="public/header" /}
<body>
<div class="x-nav">
  <a class="layui-btn layui-btn-small" style="line-height:1.6em;margin-top:3px;float:right" onclick="location.reload()" title="刷新">
    <i class="layui-icon layui-icon-refresh" style="line-height:30px"></i>
  </a>
</div>
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">
                    <button class="layui-btn" onclick="add()">
                        <i class="layui-icon"></i>添加</button>
                </div>
                <div class="layui-card-body ">
                    <table class="layui-table layui-form">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>角色名称</th>
                            <th>备注</th>
                            <th>更新时间</th>
                            <th>操作</th>
                        </tr>
                        </thead>
                        <tbody>
                        {volist name="list" id="vo"}
                        <tr>
                            <td>{$vo.role_id}</td>
                            <td>{$vo.role_name}</td>
                            <td>{$vo.desc}</td>
                            <td>{$vo.add_time}</td>
                            <td class="td-manage">
                                <button class="layui-btn layui-btn layui-btn-xs"  role_id-data="{$vo.role_id}" onclick="edit(this)" ><i class="layui-icon">&#xe642;</i>编辑</button>
                                <button class="layui-btn-normal layui-btn layui-btn-xs"  role_id-data="{$vo.role_id}" onclick="giveQx(this)" ><i class="layui-icon">&#xe640;</i>权限分配</button>
                                {if ($vo.role_id != 1) }
                                <button class="layui-btn-danger layui-btn layui-btn-xs"  role_id-data="{$vo.role_id}" onclick="del(this)" ><i class="layui-icon">&#xe640;</i>删除</button>{/if}
                            </td>
                        </tr>
                        {/volist}
                        </tbody>
                    </table>
                </div>
                <div class="layui-card-body ">
                    <div id="pages" class="center"></div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- 角色分配 -->
<div class="zTreeDemoBackground" style="display: none" id="role">
    <input type="hidden" id="nodeid">
    <div class="form-group">
        <div class="col-sm-5 col-sm-offset-2">
            <ul id="treeType" class="ztree"></ul>
        </div>
    </div>
    <div class="form-group">
        <div class="col-sm-4 col-sm-offset-4" style="margin-bottom: 15px">
            <input type="button" style="margin-left: 10%" value="确认分配" class="layui-btn btn-primary" id="postform"/>
        </div>
    </div>
</div>
</body>

<link rel="stylesheet" href="__STATIC__/zTree/zTreeStyle.css" type="text/css">
<script type="text/javascript" src="__STATIC__/zTree/jquery.ztree.core-3.5.js"></script>
<script type="text/javascript" src="__STATIC__/zTree/jquery.ztree.excheck-3.5.js"></script>
<script type="text/javascript" src="__STATIC__/zTree/jquery.ztree.exedit-3.5.js"></script>

<script>

    var curUrl="{:url('authrole/index',$param)}";
    layui.use(['laypage', 'layer'], function() {
        var laypage = layui.laypage
            , layer = layui.layer,
            $ = layer.jquery;
        laypage.render({
            elem: 'pages'
            ,count: {$total}
            ,limit: {$limit}
            ,limits:[10,20,50,100]
            ,curr: {$page}
            ,layout: ['count', 'prev', 'page', 'next', 'limit', 'skip']
            ,jump: function(obj,first){
                if(!first){
                    location.href = curUrl.replace('%7Bpage%7D',obj.curr).replace('%7Blimit%7D',obj.limit);
                }
            }
        });
    });


    layui.use(['form'], function(){
        form = layui.form;

        /* 监听状态设置开关 */
        form.on('switch(switch)', function() {
            var that = $(this), state = 0;
            if (!that.attr('data-href')) {
                layer.msg('请设置data-href参数');
                return false;
            }
            if (this.checked) {
                state = 1;
            }
            $.get(that.attr('data-href'), {state:state}, function(data) {
                if (data.code == 1) {
                    layer.msg(data.msg,{icon:1});
                }else{
                    that.trigger('click');
                    form.render('checkbox');
                    layer.msg(data.msg,{icon:2});
                }
            });
        });

    });
    /*
    添加
     */
    function add() {
        var url='{:url("authrole/add")}';
        layer.open({
            type: 2,
            title: '信息',
            shadeClose: true,
            shade: 0.8,
            area: ['80%', '80%'],
            content: url, //iframe的url
        });
    }

    /*
    编辑
     */
    function edit(t) {
        var role_id=$(t).attr("role_id-data");
        var url='{:url("authrole/edit")}'+'?role_id='+role_id;
        layer.open({
            type: 2,
            title: '信息',
            shadeClose: true,
            shade: 0.8,
            area: ['80%', '80%'],
            content: url, //iframe的url
        });
    }
    /*
    删除
     */
    function del(t) {
        var role_id=$(t).attr("role_id-data");
        layer.confirm('你确定要删除么？', {
            btn: ['确定', '取消'] //可以无限个按钮
        }, function(index, layero){
            //按钮【按钮一】的回调
            $.post('{:url("authrole/del")}',{'role_id':role_id},function(data){
                if(data.code==1){
                    layer.msg(data.msg,{icon:1});
                    setTimeout(function () {
                        window.location.reload();
                    },1500);
                }else{
                    layer.alert(data.msg,{icon:2});
                }
            });

        }, function(index){
            //按钮【按钮二】的回调
        });

    }



    zNodes = '';
    var index = '';
    var index2 = '';
    //分配权限
    function giveQx(t){
        var id=$(t).attr("role_id-data");
        $("#nodeid").val(id);
        //加载层
        index2 = layer.load(0, {shade: false}); //0代表加载的风格，支持0-2
        //获取权限信息
        $.getJSON("{:url('authrole/give')}", {'type' : 'get', 'id' : id}, function(res){
            layer.close(index2);
            if(res.code == 1){
                zNodes = JSON.parse(res.data);  //将字符串转换成obj

                //页面层
                index = layer.open({
                    type: 1,
                    area:['500px', '80%'],
                    title:'权限分配',
                    skin: 'layui-layer-demo', //加上边框
                    content: $('#role')
                });

                //设置zetree
                var setting = {
                    check:{
                        enable:true
                    },
                    data: {
                        simpleData: {
                            enable: true
                        }
                    }
                };

                $.fn.zTree.init($("#treeType"), setting, zNodes);
                var zTree = $.fn.zTree.getZTreeObj("treeType");
                zTree.expandAll(true);

            }else{
                layer.msg(res.msg,{icon:2});
            }
        });
    }

    //确认分配权限
    $("#postform").click(function(){
        var zTree = $.fn.zTree.getZTreeObj("treeType");
        var nodes = zTree.getCheckedNodes(true);
        var NodeString = '';
        $.each(nodes, function (n, value) {
            if(n>0){
                NodeString += ',';
            }
            NodeString += value.id;
        });
        var id = $("#nodeid").val();
        //写入库
        $.post('{:url("authrole/give")}', {'type' : 'give', 'id' : id, 'rule' : NodeString}, function(res){
            layer.close(index);
            if(res.code == 1){
                layer.msg(res.msg,{icon:1});
                setTimeout(function () {
                    location.reload();
                },1500);
            }else{
                layer.msg(res.msg,{icon:2});
            }

        }, 'json')
    })
</script>

</html>
