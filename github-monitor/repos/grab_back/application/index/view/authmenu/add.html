{include file="public/header" /}
<body>
<div class="layui-fluid">
  <div class="layui-row">
    <form class="layui-form">
      {if condition="$find"}

      <div class="layui-form-item">
        <label for="parent_id" class="layui-form-label">
          <span class="x-red">*</span>父级菜单
        </label>
        <div class="layui-input-inline">
          <input type="text" id="parent_id" disabled  data-parent_id="{$find.id}" value="{$find.name}"
                 lay-verify="required"  placeholder=""  autocomplete="off" class="layui-input">
        </div>
      </div>
      <div class="layui-form-item">
        <label for="name" class="layui-form-label">
          <span class="x-red">*</span>菜单名称
        </label>
        <div class="layui-input-inline">
          <input type="text" id="name"  required="" lay-verify="required" placeholder="请输入菜单名称" autocomplete="off" class="layui-input">
        </div>
      </div>

      <div class="layui-form-item">
        <label for="name" class="layui-form-label">
          <span class="x-red">*</span>路由
        </label>
        <div class="layui-input-inline">
          <input type="text" id="url"  required="" lay-verify="required" placeholder="/控制器/方法"
                 autocomplete="off" class="layui-input">
          <span class="help-block m-b-none">如：/user/add </span>
        </div>
      </div>
      {else /}
      <div class="layui-form-item">
        <label for="name" class="layui-form-label">
          <span class="x-red">*</span>菜单名称
        </label>
        <div class="layui-input-inline">
          <input type="text" id="name"  required="" lay-verify="required" placeholder="请输入菜单名称" autocomplete="off" class="layui-input">
        </div>
      </div>
      {/if}

      <div class="layui-form-item">
        <label for="ico" class="layui-form-label">
          <span class="x-red"></span>图标样式
        </label>
        <div class="layui-input-inline">
          <input type="text" id="ico" placeholder="输入菜单名称前显示的CSS样式" autocomplete="off" class="layui-input">
        </div>
        <span class="help-block m-b-none"> <a href="http://fontawesome.dashgame.com/" target="_black">选择图标</a> 如fa-user </span>
      </div>

      <div class="layui-form-item">
        <label class="layui-form-label"><span class="x-red">*</span>状态</label>
        <div class="layui-input-block">
          <input type="radio" value="1" name="status"  title="开启" checked >
          <input type="radio" value="0" name="status"  title="关闭">
        </div>
      </div>

      <div class="layui-form-item">
        <label for="sort" class="layui-form-label">
          <span class="x-red"></span>排序
        </label>
        <div class="layui-input-inline">
          <input type="number" id="sort"  min="0" placeholder="输入排序,不填默认为99" autocomplete="off" class="layui-input">
        </div>
      </div>

      <div class="layui-form-item">
        <label for="sort" class="layui-form-label">
        </label>
        <button  class="layui-btn"  lay-submit="add"  lay-filter="add">
          添加
        </button>
        <button type="reset" class="layui-btn layui-btn-primary">重置</button>
      </div>
    </form>
  </div>
</div>
<script>
  layui.use(['form', 'layer'],
          function() {
            $ = layui.jquery;
            var form = layui.form,
                    layer = layui.layer;

            form.verify({
              required: [/[\S]+/, "必填项不能为空"],
            });

            form.on('submit(add)', function (data) {
              var parent_id=$("#parent_id").attr("data-parent_id");
              var name=$("#name").val();
              var url=$("#url").val();
              var ico=$("#ico").val();
              var sort=$("#sort").val();
              var status = $('input[name=status]:checked').val();
              $.ajax({
                url: "{:url('authmenu/add')}",
                type: "POST",
                data: {
                  parent_id: parent_id,
                  name: name,
                  url: url,
                  ico: ico,
                  sort: sort,
                  status: status
                },
                async: false,
                success: function (data) {
                  console.log(data);
                  if(data.code==1){
                    layer.msg(data.msg,{icon:1});
                    setTimeout(function () {
                      parent.layer.closeAll();
                      parent.location.reload();
                    },1500);
                  }else{
                    layer.msg(data.msg,{icon:2});
                  }
                },
                error: function () {
                  layer.msg("System Service Busy!", {offset: '200px'});
                }
              });
              return false;
            });

          });
</script>
</body>

</html>
