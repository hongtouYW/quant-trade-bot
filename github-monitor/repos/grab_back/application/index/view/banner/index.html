{include file="public/header" /}
<body>
<div class="layui-fluid">
  <div class="layui-row layui-col-space15">
    <div class="layui-col-md12">
      <div class="layui-card">
        <div class="layui-card-body ">
          <form class="layui-form layui-col-space5" action="">
            <div class="layui-input-inline layui-show-xs-block">
              <input type="text" name="wd" placeholder="请输入Banner名称"  value="{$param['wd']}" autocomplete="off" class="layui-input">
            </div>
            <div class="layui-input-inline layui-show-xs-block">
              <input type="submit" class="layui-btn"  value="搜索">
            </div>
          </form>
        </div>
        <div class="layui-card-header">
          <button class="layui-btn" onclick="set_add()">
            <i class="layui-icon"></i>添加</button>
        </div>
        <div class="layui-card-body ">
          <table class="layui-table layui-form">
            <thead>
            <tr>
              <th width="70">ID</th>
              <th>标题</th>
              <th>对应视频</th>
              <th>对应演员</th>
              <th width="200">缩略图</th>
              <th width="200">跳转url</th>
              <th width="50">状态</th>
              <th width="50">排序</th>
              <th width="250">操作</th>
            </tr>
            </thead>
            <tbody>

            {volist name="list" id="vo"}
            <tr>
              <td>{$vo.id}</td>
              <td>{$vo.title}</td>
              <td>{$vo.vid}</td>
              <td>{$vo.aid}</td>
              <td><div style="height:50px;width:50px;cursor:pointer;" onclick="show_img(this)"><img style="width: 100%;height: 100%" src="{$vo.thumb}"></div></td>
              <td>{$vo.url}</td>
              <td>
                <input type="checkbox" data-id="{$vo.id}" type="checkbox" name="is_show" {if condition="$vo.is_show eq 1"} checked {/if}  value="{$vo['is_show']}" lay-skin="switch" lay-filter="modify" lay-text="展示|隐藏" >
              </td>
              <td><input  type="number" min="0" autocomplete="off" data-id="{$vo.id}" onchange="set_sort(this,this.value)" value="{$vo.sort}" class="layui-input sort"></td>

              <td class="td-manage">
                <button class="layui-btn layui-btn layui-btn-xs"  onclick="set_edit(this,'{$vo.id}')" ><i class="layui-icon">&#xe642;</i>编辑</button>
                <button class="layui-btn-danger layui-btn layui-btn-xs"  onclick="set_del(this,'{$vo.id}')" ><i class="layui-icon">&#xe640;</i>删除</button>
              </td>

            </tr>
            {/volist}
            </tbody>
          </table>
        </div>
        <div class="layui-card-body ">
          <div id="pages" class="center"></div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
<script>

layui.use(['laydate', 'form'],
    function() {
      $ = layui.jquery;
      var form = layui.form,
          layer = layui.layer;

      var curUrl = "{:url('banner/index',$param)}";
      layui.use(['laypage', 'layer'], function () {
        var laypage = layui.laypage
            , layer = layui.layer,
            $ = layer.jquery;
        laypage.render({
          elem: 'pages'
          , count: {$total}
          , limit: {$limit}
          , limits: [10, 20, 50, 100]
          , curr: {$page}
          , layout: ['count', 'prev', 'page', 'next', 'limit', 'skip']
          , jump: function (obj, first) {
            if (!first) {
              location.href = curUrl.replace('%7Bpage%7D', obj.curr).replace('%7Blimit%7D', obj.limit);
            }
          }
        });
      });


      form.on('switch(modify)',function(data){
        var that = $(this), status = 0;
        if(this.checked){
          status = 1;
        }
        var field = that.attr('name');
        var id = that.attr('data-id');
        $.ajax({
          url: "{:url('banner/modify')}",
          type: "POST",
          data: {
            id:id,
            field: field,
            value: status,
          },
          async: false,
          success: function (data) {
            if(data.code==1){
              layer.msg(data.msg,{icon:1});
              setTimeout(function () {
                location.reload();
              }, 1500);
            }else{
              layer.msg(data.msg,{icon:2});
            }
          },
          error: function () {
            layer.msg("System Service Busy!", {offset: '200px'});
          }
        });
      });
    });


/*
添加
 */
function set_add() {
  var url='{:url("info")}';
  var add = layer.open({
    type: 2,
    title: '添加广告',
    area: ['100%', '100%'],
    content: url, //iframe的url
  });
  layer.full(add)
}

/*
编辑
 */
function set_edit(obj,id) {
  var url='{:url("info")}'+'?id='+id;
  var edit = layer.open({
    type: 2,
    title: '编辑广告',
    area: ['100%', '100%'],
    content: url, //iframe的url
  });
  layer.full(edit)
}

/*
删除
 */
function set_del(obj,id) {
  layer.confirm('你确定要删除么？', {
    btn: ['确定', '取消'] //可以无限个按钮
  }, function(index, layero){
    //按钮【按钮一】的回调
    $.post('{:url("del")}',{'id':id},function(data){
      if(data.code==1){

        $(obj).parents("tr").remove();
        layer.msg(data.msg,{icon:1,time:1000});

      }else{
        layer.alert(data.msg,{icon:2});
      }
    });

  }, function(index){
    //按钮【按钮二】的回调
  });

}


/*
排序
 */
function set_sort(t,value) {
  var id=$(t).attr("data-id");
  $.ajax({
    url: "{:url('banner/modify')}",
    type: "POST",
    data: {
      id:id,
      field: 'sort',
      value: value,
    },
    async: false,
    success: function (data) {
      if(data.code==1){
        layer.msg(data.msg,{icon:1});
        setTimeout(function () {
          location.reload();
        }, 1500);
      }else{
        layer.msg(data.msg,{icon:2});
      }
    },
    error: function () {
      layer.msg("System Service Busy!", {offset: '200px'});
    }
  });

}

//图片显示
function show_img(t) {
  var t = $(t).find("img");
  //页面层
  layer.open({
    type: 1,
    skin: 'layui-layer-rim', //加上边框
    area: ['75%', '75%'], //宽高
    shadeClose: true, //开启遮罩关闭
    end: function (index, layero) {
      $('body,html,iframe').css({
        "overflow-x": "auto",
        "overflow-y": "auto"
      });
      return false;
    },
    content: '<div style="text-align:center"><img src="' + $(t).attr('src') + '" /></div>'
  });
  $('body,html,iframe').css({
    "overflow-x": "hidden",
    "overflow-y": "hidden"
  });
}
</script>

</html>
