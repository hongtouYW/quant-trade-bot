{include file="public/header" /}
<body>
<div class="layui-fluid">
  <div class="layui-row">
    <form class="layui-form">
      <input type="hidden" name="id" value="{$info.id}">
      <div class="layui-form-item">
        <label class="layui-form-label">
          <span class="x-red">*</span>标题
        </label>
        <div class="layui-input-inline">
          <input type="text"  name="title" value="{$info.title}" lay-verify="required"
                 autocomplete="off" class="layui-input">
        </div>
      </div>


      <div class="layui-form-item">
        <label class="layui-form-label">对应视频ID：</label>
        <div class="layui-input-inline">
          <input type="text" id="vid" class="layui-input" value="{$info.vid}" placeholder="视频id" name="vid">
        </div>
        <div class="layui-input-inline">
          <a class="layui-btn selectVideo"  title="查询视频">查询视频</a>
        </div>
      </div>

      <div class="layui-form-item">
        <label class="layui-form-label">对应演员ID：</label>
        <div class="layui-input-inline">
          <input type="text" id="aid" class="layui-input" value="{$info.aid}" placeholder="演员id" name="aid">
        </div>
        <div class="layui-input-inline">
          <a class="layui-btn selectActor"  title="查询演员">查询演员</a>
        </div>
      </div>

      <div class="layui-form-item">
        <label class="layui-form-label">
          <span class="x-red">*</span>缩略图
        </label>
        <div class="layui-input-inline">
          <input type="text" name="thumb" id="thumb" value="{$info.thumb}"  lay-verify="required" style="width: 400px" class="layui-input" onclick="change()">
          <img alt style="max-width: 200px" class="image" id="img1" src="{$info.thumb}" />
        </div>
      </div>

      <div class="layui-form-item">
        <label class="layui-form-label">
          跳转url
        </label>
        <div class="layui-input-inline">
          <input type="text" name="url" value="{$info.url}"  style="width: 400px" class="layui-input">
        </div>
      </div>

      <div class="layui-form-item">
        <label class="layui-form-label">
          <span class="x-red"></span>排序</label>
        <div class="layui-input-inline">
          <input type="number"min="0" name="sort" autocomplete="off" value="{$info.sort}" class="layui-input">
        </div>
        <div class="layui-form-mid layui-word-aux">
          <span class="x-red"></span>不填默认为0
        </div>
      </div>

      <div class="layui-form-item">
        <label class="layui-form-label">
        </label>
        <button  class="layui-btn"  lay-submit="sub"  lay-filter="sub">
          保存
        </button>
      </div>
    </form>
  </div>
</div>
<script>layui.use(['form', 'layer'],
        function() {
          $ = layui.jquery;
          var form = layui.form,
                  layer = layui.layer;
          form.verify({
            required: [/[\S]+/, "必填项不能为空"],
          });

          form.on('submit(sub)', function (data) {
            $.ajax({
              url: "{:url('info')}",
              type: "POST",
              data: data.field,
              async: false,
              success: function (data) {
                console.log(data);
                if(data.code==1){
                  layer.msg(data.msg,{icon:1});
                  setTimeout(function () {
                    parent.layer.closeAll();
                    parent.location.reload();
                  },1500);
                }else{
                  layer.msg(data.msg,{icon:2});
                }
              },
              error: function () {
                layer.msg("System Service Busy!", {offset: '200px'});
              }
            });
            return false;
          });

        });


function show_video() {
  var url='{:url("video_list")}';
  layer.open({
    type: 2,
    title: '视频列表',
    shadeClose: true,
    shade: 0.8,
    area: ['90%', '90%'],
    content: url, //iframe的url
  });
}

function show_actor() {
  var url='{:url("actor_list")}';
  layer.open({
    type: 2,
    title: '演员列表',
    shadeClose: true,
    shade: 0.8,
    area: ['90%', '90%'],
    content: url, //iframe的url
  });
}


// 选择标签
$('.selectVideo').click(function () {
    show_video();
})

// 选择标签
$('.selectActor').click(function () {
  show_actor();
})

/**
 * 获取子页面传递过来的分类参数
 * @param obj  分类id
 */
function GetValue(obj){
  $('#vid').val(obj);
}

/**
 * 获取子页面传递过来的分类参数
 * @param obj  分类id
 */
function GetValue1(obj){
  $('#aid').val(obj);
}
  function change() {

      var src=$("#thumb").val();
      $('#img1').attr("src", src)//这时写地址
  }
</script>
</body>

</html>
