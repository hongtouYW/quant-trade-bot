{% extends "base.html" %}
{% block title %}Register - SignalHive{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-box">
        <h1>SignalHive</h1>
        <p class="subtitle">Create your account</p>

        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" placeholder="Choose a username" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Choose a password" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm" class="form-control" placeholder="Confirm password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top: 8px;">Register</button>
        </form>
        <p style="text-align:center; margin-top: 16px; color: var(--text-muted); font-size: 13px;">
            Already have an account? <a href="/login">Login</a>
        </p>
    </div>
</div>
{% endblock %}
